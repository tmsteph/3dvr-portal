<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Recovery - 3DVR Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="gun-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="account-recovery.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #081022;
      --card: rgba(10, 25, 48, 0.92);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #f4f8ff;
      --muted: rgba(244, 248, 255, 0.72);
      --accent: #f0c75e;
      --success: #2ec27e;
      --error: #f66151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #123564 0%, #081022 58%, #050912 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: clamp(18px, 5vw, 34px);
    }

    main {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: clamp(20px, 4vw, 32px);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      line-height: 1.2;
    }

    .intro {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.86rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(10, 20, 38, 0.78);
      color: var(--text);
      font-size: 0.98rem;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240, 199, 94, 0.24);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    button,
    .link-button {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    button:hover,
    .link-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    button:disabled,
    .link-button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      transform: none;
      box-shadow: none;
    }

    #lookup-button {
      background: linear-gradient(135deg, var(--accent), #ffd989);
      color: #11192a;
    }

    #email-lookup-button,
    #request-reset-button {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .results {
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .results li {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(9, 18, 34, 0.62);
      font-size: 0.9rem;
      color: var(--text);
    }

    #status {
      margin-top: 16px;
      font-size: 0.92rem;
      line-height: 1.45;
      color: var(--muted);
      min-height: 1.4em;
    }

    .availability-note {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(240, 199, 94, 0.1);
      border: 1px solid rgba(240, 199, 94, 0.22);
      color: #ffe6a7;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .footer a {
      color: var(--accent);
    }
  </style>

  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <main>
    <h1>Recover your account</h1>
    <p class="intro">
      Use your recovery email to find your account alias. If you still cannot sign in, request an admin reset and we
      will issue temporary credentials.
    </p>

    <form id="recovery-form">
      <div class="field">
        <label for="recovery-email">Recovery email</label>
        <input id="recovery-email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="requested-username">Preferred new username (optional)</label>
        <input id="requested-username" type="text" placeholder="only used when requesting admin reset" />
      </div>

      <div class="actions">
        <button id="lookup-button" type="submit">Find account aliases</button>
        <button id="email-lookup-button" type="button">Email me my alias details</button>
        <button id="request-reset-button" type="button">Request admin password reset</button>
      </div>
      <p id="email-config-note" class="availability-note" hidden></p>
    </form>

    <ul id="alias-results" class="results" aria-live="polite"></ul>
    <p id="status" role="status" aria-live="polite"></p>

    <p class="footer">
      After you receive temporary credentials, return to <a href="/auth/sign-in.html">sign in</a> and update your recovery
      email in your profile flow.
    </p>
  </main>

  <script>
    const gun = Gun({
      peers: window.__GUN_PEERS__ || [
        'wss://relay.3dvr.tech/gun',
        'wss://gun-relay-3dvr.fly.dev/gun'
      ]
    });

    const portalRoot = gun.get('3dvr-portal');
    const recoveryForm = document.getElementById('recovery-form');
    const recoveryEmailInput = document.getElementById('recovery-email');
    const requestedUsernameInput = document.getElementById('requested-username');
    const aliasResultsEl = document.getElementById('alias-results');
    const statusEl = document.getElementById('status');
    const emailLookupButton = document.getElementById('email-lookup-button');
    const requestResetButton = document.getElementById('request-reset-button');
    const emailConfigNoteEl = document.getElementById('email-config-note');

    const defaultEmailLookupLabel = emailLookupButton.textContent;
    const defaultRequestResetLabel = requestResetButton.textContent;

    const state = {
      email: '',
      aliases: [],
      latestAlias: '',
      mailConfigured: true,
      teamRecipientsConfigured: true
    };

    function normalizeRecoveryEmail(value) {
      if (
        window.AccountRecovery
        && typeof window.AccountRecovery.normalizeEmail === 'function'
      ) {
        return window.AccountRecovery.normalizeEmail(value);
      }
      const normalized = (value || '').trim().toLowerCase();
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalized) ? normalized : '';
    }

    function setStatus(message, tone = 'muted') {
      statusEl.textContent = message;
      if (tone === 'error') {
        statusEl.style.color = 'var(--error)';
      } else if (tone === 'success') {
        statusEl.style.color = 'var(--success)';
      } else {
        statusEl.style.color = 'var(--muted)';
      }
    }

    function renderAliases(aliases = []) {
      if (!aliases.length) {
        aliasResultsEl.innerHTML = '';
        return;
      }

      aliasResultsEl.innerHTML = aliases
        .map(alias => `<li>${escapeHtml(alias)}</li>`)
        .join('');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setEmailActionState(button, enabled, label) {
      button.disabled = !enabled;
      button.textContent = label;
    }

    function setEmailConfigNote(message = '') {
      const note = String(message || '').trim();
      emailConfigNoteEl.hidden = !note;
      emailConfigNoteEl.textContent = note;
    }

    function applyRecoveryEmailDiagnostics(diagnostics = {}) {
      if (typeof diagnostics.mailConfigured === 'boolean') {
        state.mailConfigured = diagnostics.mailConfigured;
      }
      if (typeof diagnostics.teamRecipientsConfigured === 'boolean') {
        state.teamRecipientsConfigured = diagnostics.teamRecipientsConfigured;
      }

      const mailConfigured = state.mailConfigured !== false;
      const teamRecipientsConfigured = state.teamRecipientsConfigured !== false;

      setEmailActionState(
        emailLookupButton,
        mailConfigured,
        mailConfigured ? defaultEmailLookupLabel : 'Email alias details unavailable here'
      );

      setEmailActionState(
        requestResetButton,
        mailConfigured && teamRecipientsConfigured,
        mailConfigured
          ? (teamRecipientsConfigured
            ? defaultRequestResetLabel
            : 'Admin reset routing unavailable here')
          : 'Admin reset email unavailable here'
      );

      if (!mailConfigured) {
        setEmailConfigNote(
          'This deployment can still look up your account aliases on-page, but recovery emails are not configured here yet.'
        );
        return;
      }

      if (!teamRecipientsConfigured) {
        setEmailConfigNote(
          'Alias reminder emails are available here, but admin reset requests are not routed from this deployment yet.'
        );
        return;
      }

      setEmailConfigNote('');
    }

    async function lookupAliasesByEmail(email) {
      if (
        window.AccountRecovery
        && typeof window.AccountRecovery.lookupAliasesByEmail === 'function'
      ) {
        return window.AccountRecovery.lookupAliasesByEmail({
          portalRoot,
          email,
          includeArchived: false
        });
      }

      return {
        email,
        latestAlias: '',
        aliases: [],
        entries: []
      };
    }

    async function postRecoveryEmail(payload = {}) {
      const response = await fetch('/api/account-recovery-email', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const body = await response.json().catch(() => ({}));
      return {
        ok: response.ok,
        body
      };
    }

    async function loadRecoveryEmailDiagnostics() {
      try {
        const response = await fetch('/api/account-recovery-email', {
          method: 'GET'
        });
        const body = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(body.error || 'Recovery email diagnostics were unavailable.');
        }

        applyRecoveryEmailDiagnostics(body);
      } catch (error) {
        applyRecoveryEmailDiagnostics({
          mailConfigured: true,
          teamRecipientsConfigured: true
        });
      }
    }

    async function runLookup() {
      const email = normalizeRecoveryEmail(recoveryEmailInput.value);
      if (!email) {
        setStatus('Enter a valid recovery email.', 'error');
        renderAliases([]);
        return null;
      }

      setStatus('Checking the recovery index...');
      const lookup = await lookupAliasesByEmail(email);
      const aliases = Array.isArray(lookup.aliases) ? lookup.aliases.filter(Boolean) : [];
      const latestAlias = lookup.latestAlias || aliases[0] || '';

      state.email = email;
      state.aliases = aliases;
      state.latestAlias = latestAlias;

      renderAliases(aliases);

      if (!aliases.length) {
        setStatus('No account aliases were found for that email.', 'error');
      } else {
        setStatus('Found ' + aliases.length + ' account alias(es) for this email.', 'success');
      }

      return state;
    }

    recoveryForm.addEventListener('submit', async event => {
      event.preventDefault();
      try {
        await runLookup();
      } catch (error) {
        setStatus('Unable to check recovery index: ' + (error.message || 'unknown error'), 'error');
      }
    });

    emailLookupButton.addEventListener('click', async () => {
      try {
        const lookup = await runLookup();
        if (!lookup || !lookup.email || !lookup.latestAlias) {
          setStatus('Run account lookup first so we can email the matching alias.', 'error');
          return;
        }

        setStatus('Sending alias reminder email...');
        const result = await postRecoveryEmail({
          mode: 'lookup',
          email: lookup.email,
          alias: lookup.latestAlias,
          aliases: lookup.aliases
        });

        if (!result.ok) {
          applyRecoveryEmailDiagnostics(result.body);
          setStatus(result.body.error || 'Failed to send lookup email.', 'error');
          return;
        }

        setStatus('Alias reminder sent. Check your inbox for sign-in details.', 'success');
      } catch (error) {
        setStatus('Unable to send alias reminder: ' + (error.message || 'unknown error'), 'error');
      }
    });

    requestResetButton.addEventListener('click', async () => {
      try {
        const lookup = await runLookup();
        if (!lookup || !lookup.email) {
          setStatus('Enter a valid recovery email first.', 'error');
          return;
        }

        const requestedUsername = (requestedUsernameInput.value || '').trim();
        setStatus('Sending admin reset request...');
        const result = await postRecoveryEmail({
          mode: 'admin-reset-request',
          email: lookup.email,
          alias: lookup.latestAlias,
          aliases: lookup.aliases,
          requestedUsername
        });

        if (!result.ok) {
          applyRecoveryEmailDiagnostics(result.body);
          setStatus(result.body.error || 'Could not submit admin reset request.', 'error');
          return;
        }

        setStatus('Admin reset request submitted. Watch your email for temporary credentials.', 'success');
      } catch (error) {
        setStatus('Unable to request admin reset: ' + (error.message || 'unknown error'), 'error');
      }
    });

    loadRecoveryEmailDiagnostics();
  </script>
</body>
</html>
