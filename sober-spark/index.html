<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sober Spark | 3DVR Portal</title>
  <link rel="stylesheet" href="../styles/global.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #090909;
      --ink: #f8f0da;
      --muted: #b7ad94;
      --hot: #ff4d2e;
      --pulse: #ffe66d;
      --blue: #2fe6ff;
      --green: #55ff84;
      --panel: rgba(10, 10, 10, 0.64);
      --line: rgba(248, 240, 218, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(120deg, rgba(255, 77, 46, 0.2), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(47, 230, 255, 0.22), transparent 26rem),
        radial-gradient(circle at 12% 82%, rgba(85, 255, 132, 0.16), transparent 24rem),
        var(--bg);
      color: var(--ink);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    body.immersive .brand h1,
    body.immersive .status,
    body.immersive .stage-label {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    body.immersive .bottom-bar {
      justify-content: flex-end;
      pointer-events: auto;
    }

    body.immersive .controls {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    body.immersive .controls > :not(#focusButton) {
      display: none;
    }

    body.immersive #focusButton {
      min-width: 148px;
      background: rgba(255, 230, 109, 0.18);
      border-color: rgba(255, 230, 109, 0.34);
    }

    body.peak {
      animation: peak-shock 900ms ease-out;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }

    .shell {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      pointer-events: none;
    }

    header,
    .controls,
    .bottom-bar {
      pointer-events: auto;
    }

    header {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .brand {
      display: grid;
      gap: 6px;
    }

    .portal-link {
      width: fit-content;
      padding: 12px 16px;
      border: 1px solid rgba(255, 230, 109, 0.36);
      background:
        linear-gradient(135deg, rgba(255, 230, 109, 0.2), rgba(47, 230, 255, 0.14)),
        rgba(10, 10, 10, 0.72);
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      font-size: 0.98rem;
      box-shadow:
        0 0 28px rgba(255, 230, 109, 0.2),
        0 14px 45px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(14px);
    }

    .portal-link:hover,
    .portal-link:focus-visible {
      outline: 2px solid var(--pulse);
      outline-offset: 3px;
      background:
        linear-gradient(135deg, rgba(255, 230, 109, 0.36), rgba(47, 230, 255, 0.22)),
        rgba(10, 10, 10, 0.82);
    }

    h1 {
      margin: 0;
      max-width: 720px;
      color: var(--ink);
      font-size: 5.8rem;
      line-height: 0.82;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow:
        0 0 28px rgba(255, 230, 109, 0.36),
        0 0 56px rgba(255, 77, 46, 0.28);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(18px);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 10px;
      height: 10px;
      background: var(--green);
      box-shadow: 0 0 18px var(--green);
    }

    .stage-label {
      align-self: center;
      justify-self: center;
      text-align: center;
      max-width: 720px;
      padding: 24px;
      pointer-events: none;
      text-transform: uppercase;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .stage-label strong {
      display: block;
      font-size: 4.8rem;
      line-height: 0.88;
      letter-spacing: 0;
      text-shadow: 0 0 36px rgba(47, 230, 255, 0.38);
    }

    .stage-label span {
      display: block;
      margin-top: 14px;
      color: rgba(248, 240, 218, 0.7);
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .bottom-bar {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 0 0 20px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 16px;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(18px);
    }

    button,
    .select-wrap {
      min-height: 46px;
      border: 1px solid rgba(248, 240, 218, 0.18);
      background: rgba(248, 240, 218, 0.08);
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    button {
      cursor: pointer;
      padding: 0 14px;
    }

    button:hover,
    button:focus-visible {
      outline: 2px solid var(--pulse);
      outline-offset: 2px;
      background: rgba(255, 230, 109, 0.18);
    }

    button[data-active="true"] {
      background: linear-gradient(135deg, var(--pulse), var(--hot));
      color: #140800;
      border-color: transparent;
    }

    .select-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      color: var(--muted);
    }

    select {
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      outline: none;
    }

    option {
      background: #111;
      color: var(--ink);
    }

    .spark {
      position: fixed;
      z-index: 3;
      width: 18px;
      height: 18px;
      border: 2px solid var(--pulse);
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(45deg);
      animation: pop 520ms ease-out forwards;
      box-shadow: 0 0 26px var(--pulse);
    }

    .spark.capture {
      width: 34px;
      height: 34px;
      border-color: var(--blue);
      border-radius: 999px;
      box-shadow:
        0 0 34px var(--blue),
        inset 0 0 20px rgba(47, 230, 255, 0.45);
      animation-name: capture-pop;
    }

    @keyframes capture-pop {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.18);
      }

      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(5.8);
      }
    }

    @keyframes peak-shock {
      0% {
        filter: saturate(1);
      }

      28% {
        filter: saturate(2.8) contrast(1.28);
      }

      100% {
        filter: saturate(1);
      }
    }

    @keyframes pop {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(45deg) scale(0.2);
      }

      to {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(225deg) scale(3.4);
      }
    }

    @media (max-width: 720px) {
      header {
        display: grid;
      }

      h1 {
        font-size: 3.25rem;
      }

      .stage-label strong {
        font-size: 2.65rem;
      }

      .stage-label span {
        font-size: 0.98rem;
      }

      .status {
        width: fit-content;
      }

      .portal-link {
        font-size: 0.9rem;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      button,
      .select-wrap {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spark {
        animation-duration: 1ms;
      }
    }
  </style>
</head>
<body>
  <canvas id="stage" aria-label="Interactive stimulation field"></canvas>
  <div class="shell">
    <header>
      <div class="brand">
        <a class="portal-link" href="../index.html">Back to 3DVR Portal</a>
        <h1>Sober Spark</h1>
      </div>
      <div class="status" id="soundStatus">Sound muted</div>
    </header>

    <div class="stage-label" aria-live="polite">
      <strong id="modeTitle">Ride the urge</strong>
      <span id="modeLine">Move, tap, hold, breathe, repeat</span>
    </div>

    <div class="bottom-bar">
      <div class="controls" aria-label="Sober Spark controls">
        <button type="button" id="soundButton">Unmute sound</button>
        <button type="button" id="burstButton">Burst</button>
        <button type="button" id="strobeButton" data-active="false">Strobe</button>
        <button type="button" id="focusButton">Fullscreen</button>
        <button type="button" id="resetButton">Reset</button>
        <label class="select-wrap">
          Mode
          <select id="modeSelect">
            <option value="urge">Urge surf</option>
            <option value="coffee">Coffee edge</option>
            <option value="weed">Weed tunnel</option>
            <option value="mushrooms">Mushroom drift</option>
            <option value="lsd">LSD geometry</option>
            <option value="dmt">DMT flash</option>
            <option value="alcohol">Alcohol wobble</option>
            <option value="focus">Focus tunnel</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const soundButton = document.getElementById("soundButton");
    const soundStatus = document.getElementById("soundStatus");
    const burstButton = document.getElementById("burstButton");
    const strobeButton = document.getElementById("strobeButton");
    const focusButton = document.getElementById("focusButton");
    const resetButton = document.getElementById("resetButton");
    const modeSelect = document.getElementById("modeSelect");
    const modeTitle = document.getElementById("modeTitle");
    const modeLine = document.getElementById("modeLine");

    const modes = {
      urge: {
        title: "Ride the urge",
        line: "Move, tap, hold, breathe, repeat",
        colors: ["#ff4d2e", "#ffe66d", "#2fe6ff", "#55ff84"],
        effect: "spark",
        tempo: 1.08,
        tone: 130.81
      },
      coffee: {
        title: "Wake without coffee",
        line: "Fast eyes, clean hands, no crash",
        colors: ["#ffe66d", "#ff8a2a", "#2fe6ff", "#ffffff"],
        effect: "spark",
        tempo: 1.42,
        tone: 164.81
      },
      weed: {
        title: "Zone the tunnel",
        line: "Slow pull, green haze, no smoke",
        colors: ["#55ff84", "#174f2f", "#b7ff3c", "#2fe6ff"],
        effect: "weedTunnel",
        tempo: 0.78,
        tone: 98
      },
      mushrooms: {
        title: "Mycelium drift",
        line: "Organic waves, grounded feet",
        colors: ["#ff7bd5", "#f8f0da", "#ffb85c", "#65ff9a"],
        effect: "mushrooms",
        tempo: 0.86,
        tone: 146.83
      },
      lsd: {
        title: "Prism without the tab",
        line: "Clean geometry, sharp colors, stay here",
        colors: ["#ff2fd6", "#ffe66d", "#2fe6ff", "#ffffff"],
        effect: "lsd",
        tempo: 1.36,
        tone: 220
      },
      dmt: {
        title: "Flash tunnel",
        line: "Fast portal, short blast, breathe out",
        colors: ["#ff4dff", "#2fe6ff", "#ffe66d", "#55ff84"],
        effect: "dmt",
        tempo: 1.58,
        tone: 261.63
      },
      alcohol: {
        title: "Wobble without drinking",
        line: "Amber blur, steady body, clear exit",
        colors: ["#ffb14d", "#7c1f18", "#f8f0da", "#2fe6ff"],
        effect: "alcohol",
        tempo: 0.96,
        tone: 110
      },
      focus: {
        title: "Lock the tunnel",
        line: "Narrow the noise into one beam",
        colors: ["#2fe6ff", "#f8f0da", "#55ff84", "#ffe66d"],
        effect: "focusTunnel",
        tempo: 1.24,
        tone: 196
      }
    };

    let width = 0;
    let height = 0;
    let dpr = 1;
    let particles = [];
    let rings = [];
    let stars = [];
    let pointer = { x: 0.5, y: 0.5, down: false, active: false };
    let camera = { x: 0, y: 0, zoom: 1, rush: 0 };
    const keys = new Set();
    const gesture = { active: false, lastDistance: 0, lastX: 0, lastY: 0 };
    let intensity = 0.58;
    let charge = 0.18;
    let peakPulse = 0;
    let peakCooldown = 0;
    let immersive = false;
    let strobe = false;
    let audio = null;
    let soundOn = false;
    let beatTimer = 0;
    let capturePulse = 0;
    let lastTime = performance.now();

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      seed();
    }

    function seed() {
      const count = Math.floor(Math.min(260, Math.max(120, (width * height) / 8200)));
      particles = Array.from({ length: count }, (_, index) => {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.25 + Math.random() * 1.8;
        return {
          x: Math.random() * width,
          y: Math.random() * height,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 1 + Math.random() * 5,
          hue: index % 4,
          spin: Math.random() * Math.PI * 2
        };
      });
      stars = Array.from({ length: 80 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        size: 0.5 + Math.random() * 1.8,
        phase: Math.random() * Math.PI * 2
      }));
    }

    function activeMode() {
      return modes[modeSelect.value] || modes.urge;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setPointer(event) {
      const point = event.touches ? event.touches[0] : event;
      pointer.x = clamp(point.clientX / width, 0, 1);
      pointer.y = clamp(point.clientY / height, 0, 1);
      pointer.active = true;
      intensity = Math.min(1, intensity + 0.03);
    }

    function viewPoint() {
      return {
        x: width * 0.5 + camera.x + (pointer.x - 0.5) * width * 0.52,
        y: height * 0.5 + camera.y + (pointer.y - 0.5) * height * 0.52,
        scale: camera.zoom
      };
    }

    function zoomAt(factor, originX = width * 0.5, originY = height * 0.5) {
      const previous = camera.zoom;
      camera.zoom = clamp(camera.zoom * factor, 0.34, 4.6);
      const ratio = camera.zoom / previous;
      camera.x += (width * 0.5 - originX) * (ratio - 1) * 0.5;
      camera.y += (height * 0.5 - originY) * (ratio - 1) * 0.5;
      camera.rush = Math.min(1.2, camera.rush + Math.abs(ratio - 1) * 0.75);
      camera.x = clamp(camera.x, -width * 0.82, width * 0.82);
      camera.y = clamp(camera.y, -height * 0.82, height * 0.82);
    }

    function updateNavigation(dt) {
      const pan = (360 + 320 * camera.zoom) * dt;
      if (keys.has("a")) {
        camera.x -= pan;
        chargeInteraction(0.01);
      }
      if (keys.has("d")) {
        camera.x += pan;
        chargeInteraction(0.01);
      }
      if (keys.has("w")) {
        camera.y -= pan;
        chargeInteraction(0.012);
      }
      if (keys.has("s")) {
        camera.y += pan;
        chargeInteraction(0.012);
      }
      if (!keys.has("a") && !keys.has("d")) camera.x *= 1 - Math.min(0.08, dt * 0.7);
      if (!keys.has("w") && !keys.has("s")) camera.y *= 1 - Math.min(0.08, dt * 0.7);
      camera.rush = Math.max(0, camera.rush - dt * 0.9);
      camera.x = clamp(camera.x, -width * 0.82, width * 0.82);
      camera.y = clamp(camera.y, -height * 0.82, height * 0.82);
    }

    function chargeInteraction(amount) {
      charge = Math.min(1.08, charge + amount);
      if (charge >= 1 && peakCooldown <= 0) {
        peakBlast();
      }
    }

    function addRing(x = pointer.x * width, y = pointer.y * height, force = 1, kind = "spark") {
      rings.push({ x, y, r: 8, force, life: 1 });
      const spark = document.createElement("span");
      spark.className = kind === "capture" ? "spark capture" : "spark";
      spark.style.left = `${x}px`;
      spark.style.top = `${y}px`;
      document.body.appendChild(spark);
      spark.addEventListener("animationend", () => spark.remove(), { once: true });
      if (soundOn) playPing(force);
    }

    function peakBlast() {
      charge = 0.22;
      peakPulse = 1.4;
      peakCooldown = 2.8;
      capturePulse = 1.15;
      camera.rush = 1.2;
      document.body.classList.remove("peak");
      void document.body.offsetWidth;
      document.body.classList.add("peak");
      window.setTimeout(() => document.body.classList.remove("peak"), 920);
      for (let i = 0; i < 11; i += 1) {
        addRing(
          width * (0.12 + Math.random() * 0.76),
          height * (0.12 + Math.random() * 0.76),
          1.35 + Math.random() * 1.2,
          i % 3 === 0 ? "capture" : "spark"
        );
      }
      particles.forEach((particle) => {
        const angle = Math.atan2(particle.y - height * 0.5, particle.x - width * 0.5) + Math.random() * 1.6 - 0.8;
        particle.vx += Math.cos(angle) * (5 + Math.random() * 5);
        particle.vy += Math.sin(angle) * (5 + Math.random() * 5);
      });
      if (soundOn) {
        playKick(1.4);
        playNoise(1.6);
        playPing(1.5);
      }
      soundStatus.textContent = "Peak burst";
    }

    function captureField(event) {
      if (event.button !== undefined && event.button !== 2) return;
      event.preventDefault();
      setPointer(event);
      pointer.down = true;
      capturePulse = 1;
      zoomAt(1.16, event.clientX, event.clientY);
      chargeInteraction(0.22);
      if (canvas.setPointerCapture && event.pointerId !== undefined) {
        try {
          canvas.setPointerCapture(event.pointerId);
        } catch (err) {
          // Pointer capture is a progressive enhancement.
        }
      }
      addRing(event.clientX, event.clientY, 1.45, "capture");
      particles.forEach((particle, index) => {
        const dx = particle.x - event.clientX;
        const dy = particle.y - event.clientY;
        const dist = Math.hypot(dx, dy) || 1;
        const wave = index % 2 === 0 ? 1 : -1;
        particle.vx += (dx / dist) * 3.2 + (-dy / dist) * wave * 1.5;
        particle.vy += (dy / dist) * 3.2 + (dx / dist) * wave * 1.5;
      });
      if (soundOn) playNoise(1.1);
      soundStatus.textContent = soundOn ? "Right-click capture live" : "Right-click capture";
    }

    function handlePointerDown(event) {
      if (event.button === 2) {
        captureField(event);
        return;
      }
      if (event.button !== 0) return;
      event.preventDefault();
      setPointer(event);
      pointer.down = true;
      if (canvas.setPointerCapture && event.pointerId !== undefined) {
        try {
          canvas.setPointerCapture(event.pointerId);
        } catch (err) {
          // Pointer capture is a progressive enhancement.
        }
      }
      addRing(event.clientX, event.clientY, 0.55);
      chargeInteraction(0.06);
    }

    function handleWheel(event) {
      event.preventDefault();
      setPointer(event);
      const factor = Math.exp(-event.deltaY * 0.00115);
      zoomAt(factor, event.clientX, event.clientY);
      capturePulse = Math.min(1, capturePulse + 0.12);
      intensity = Math.min(1, intensity + 0.08);
      chargeInteraction(0.085);
      addRing(event.clientX, event.clientY, 0.32);
      soundStatus.textContent = camera.zoom > 1 ? "Wheel zooming in" : "Wheel zooming out";
    }

    function touchMidpoint(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) * 0.5,
        y: (touches[0].clientY + touches[1].clientY) * 0.5
      };
    }

    function touchDistance(touches) {
      return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
      );
    }

    function handleTouchStart(event) {
      if (event.touches.length === 2) {
        event.preventDefault();
        const mid = touchMidpoint(event.touches);
        gesture.active = true;
        gesture.lastDistance = touchDistance(event.touches);
        gesture.lastX = mid.x;
        gesture.lastY = mid.y;
        setPointer({ clientX: mid.x, clientY: mid.y });
        addRing(mid.x, mid.y, 0.48);
        chargeInteraction(0.08);
      } else if (event.touches.length === 1) {
        setPointer(event);
        pointer.down = true;
      }
    }

    function handleTouchMove(event) {
      if (event.touches.length !== 2) return;
      event.preventDefault();
      const mid = touchMidpoint(event.touches);
      const distance = touchDistance(event.touches);
      if (gesture.active && gesture.lastDistance > 0) {
        zoomAt(distance / gesture.lastDistance, mid.x, mid.y);
        camera.x += (mid.x - gesture.lastX) * 0.9;
        camera.y += (mid.y - gesture.lastY) * 0.9;
        capturePulse = Math.min(1, capturePulse + 0.05);
        chargeInteraction(0.035);
      }
      gesture.active = true;
      gesture.lastDistance = distance;
      gesture.lastX = mid.x;
      gesture.lastY = mid.y;
      setPointer({ clientX: mid.x, clientY: mid.y });
      soundStatus.textContent = "Two-finger flight";
    }

    function handleTouchEnd(event) {
      if (event.touches.length < 2) {
        gesture.active = false;
      }
      if (event.touches.length === 0) {
        pointer.down = false;
      }
    }

    function initAudio() {
      if (audio) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const context = new AudioContext();
      const master = context.createGain();
      const filter = context.createBiquadFilter();
      const delay = context.createDelay();
      const feedback = context.createGain();
      const pad = context.createOscillator();
      const padGain = context.createGain();
      const bass = context.createOscillator();
      const bassGain = context.createGain();

      master.gain.value = 0.0001;
      filter.type = "lowpass";
      filter.frequency.value = 1400;
      delay.delayTime.value = 0.08;
      feedback.gain.value = 0.08;
      pad.type = "sawtooth";
      pad.frequency.value = activeMode().tone / 2;
      padGain.gain.value = 0.012;
      bass.type = "square";
      bass.frequency.value = activeMode().tone / 4;
      bassGain.gain.value = 0.018;

      pad.connect(padGain);
      padGain.connect(filter);
      bass.connect(bassGain);
      bassGain.connect(filter);
      filter.connect(delay);
      filter.connect(master);
      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(master);
      master.connect(context.destination);
      pad.start();
      bass.start();
      audio = { context, master, filter, delay, pad, padGain, bass, bassGain };
    }

    function setSound(enabled) {
      initAudio();
      soundOn = enabled;
      audio.context.resume();
      const now = audio.context.currentTime;
      audio.master.gain.cancelScheduledValues(now);
      audio.master.gain.setTargetAtTime(enabled ? 0.32 : 0.0001, now, 0.05);
      soundButton.textContent = enabled ? "Mute sound" : "Unmute sound";
      soundButton.dataset.active = String(enabled);
      soundStatus.textContent = enabled ? "Sound live" : "Sound muted";
    }

    function playPing(force = 1) {
      if (!audio) return;
      const mode = activeMode();
      const now = audio.context.currentTime;
      const osc = audio.context.createOscillator();
      const gain = audio.context.createGain();
      const pick = [1, 1.5, 2, 3][Math.floor(Math.random() * 4)];
      osc.type = Math.random() > 0.32 ? "square" : "sawtooth";
      osc.frequency.setValueAtTime(mode.tone * pick, now);
      osc.frequency.exponentialRampToValueAtTime(mode.tone * pick * (0.72 + Math.random() * 0.35), now + 0.09);
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.085 * force, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
      osc.connect(gain);
      gain.connect(audio.filter);
      osc.start(now);
      osc.stop(now + 0.15);
    }

    function playKick(force = 1) {
      if (!audio) return;
      const now = audio.context.currentTime;
      const osc = audio.context.createOscillator();
      const gain = audio.context.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(110, now);
      osc.frequency.exponentialRampToValueAtTime(38, now + 0.12);
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.18 * force, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.connect(gain);
      gain.connect(audio.master);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    function playNoise(force = 1) {
      if (!audio) return;
      const now = audio.context.currentTime;
      const length = Math.floor(audio.context.sampleRate * 0.08);
      const buffer = audio.context.createBuffer(1, length, audio.context.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      }
      const source = audio.context.createBufferSource();
      const gain = audio.context.createGain();
      source.buffer = buffer;
      gain.gain.value = 0.055 * force;
      source.connect(gain);
      gain.connect(audio.filter);
      source.start(now);
    }

    function burst(force = 1.2) {
      for (let i = 0; i < 7; i += 1) {
        addRing(
          width * (0.2 + Math.random() * 0.6),
          height * (0.18 + Math.random() * 0.64),
          force * (0.6 + Math.random() * 0.8)
        );
      }
      intensity = 1;
      chargeInteraction(0.24);
      if (soundOn) playNoise(force);
    }

    function updateAudio(dt) {
      if (!audio || !soundOn) return;
      const mode = activeMode();
      const now = audio.context.currentTime;
      const px = pointer.x || 0.5;
      const py = pointer.y || 0.5;
      audio.filter.frequency.setTargetAtTime(420 + px * 4200, now, 0.04);
      audio.delay.delayTime.setTargetAtTime(0.04 + py * 0.11, now, 0.06);
      audio.pad.frequency.setTargetAtTime(mode.tone * (0.72 + px * 0.62), now, 0.05);
      audio.bass.frequency.setTargetAtTime(mode.tone * (0.23 + px * 0.08), now, 0.04);
      audio.padGain.gain.setTargetAtTime(0.01 + intensity * 0.022, now, 0.08);
      audio.bassGain.gain.setTargetAtTime(0.018 + charge * 0.04, now, 0.05);
      beatTimer += dt * mode.tempo * (0.7 + intensity);
      if (beatTimer > 0.18) {
        beatTimer = 0;
        playKick(0.45 + charge * 0.55);
        if (Math.random() > 0.35) playPing(0.3 + intensity * 0.45);
      }
    }

    function drawTunnel(now, px, py, mode, { sides = 0, speed = 0.18, twist = 0.0018, wobble = 0 } = {}) {
      const maxRadius = Math.hypot(width, height);
      const ringCount = 32;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(now * twist + capturePulse * 0.35);
      for (let i = 0; i < ringCount; i += 1) {
        const t = (i / ringCount + now * speed * 0.001) % 1;
        const radius = 18 + t * maxRadius * 0.88;
        const alpha = (1 - t) * (0.12 + intensity * 0.4);
        const offset = Math.sin(now * 0.0016 + i * 0.55) * wobble * (20 + radius * 0.04);
        const color = mode.colors[i % mode.colors.length];
        ctx.strokeStyle = `${color}${Math.floor(Math.max(28, alpha * 255)).toString(16).padStart(2, "0")}`;
        ctx.lineWidth = 1.2 + (1 - t) * 8 + capturePulse * 5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 14 + intensity * 34;
        ctx.beginPath();
        if (sides > 2) {
          for (let p = 0; p <= sides; p += 1) {
            const a = (p / sides) * Math.PI * 2 + i * 0.13 + now * 0.0008;
            const r = radius + Math.sin(a * 3 + now * 0.002) * offset;
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            if (p === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
        } else {
          ctx.arc(offset, -offset * 0.45, radius, 0, Math.PI * 2);
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRadialSpokes(now, px, py, mode, count = 18) {
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(now * 0.0015);
      const length = Math.max(width, height);
      for (let i = 0; i < count; i += 1) {
        const angle = (i / count) * Math.PI * 2;
        const color = mode.colors[i % mode.colors.length];
        const wave = Math.sin(now * 0.003 + i) * 32;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1 + intensity * 4;
        ctx.shadowColor = color;
        ctx.shadowBlur = 20 + capturePulse * 42;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * 20, Math.sin(angle) * 20);
        ctx.quadraticCurveTo(
          Math.cos(angle + 0.35) * (length * 0.35 + wave),
          Math.sin(angle + 0.35) * (length * 0.35 - wave),
          Math.cos(angle) * length,
          Math.sin(angle) * length
        );
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawOrganicDrift(now, px, py, mode) {
      ctx.save();
      ctx.globalAlpha = 0.22 + intensity * 0.32;
      for (let i = 0; i < 11; i += 1) {
        const phase = now * 0.001 + i * 0.84;
        const x = px + Math.cos(phase) * width * (0.08 + i * 0.018);
        const y = py + Math.sin(phase * 1.3) * height * (0.08 + i * 0.014);
        const radius = 44 + Math.sin(phase * 2) * 18 + intensity * 44;
        const gradient = ctx.createRadialGradient(x, y, 4, x, y, radius * 2.4);
        gradient.addColorStop(0, `${mode.colors[i % mode.colors.length]}cc`);
        gradient.addColorStop(0.55, `${mode.colors[(i + 1) % mode.colors.length]}33`);
        gradient.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.ellipse(x, y, radius * (1.2 + Math.sin(phase) * 0.22), radius * 0.8, phase, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 0.34;
      ctx.strokeStyle = mode.colors[3];
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 24; i += 1) {
        const a = i * 0.62 + now * 0.0007;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.bezierCurveTo(
          px + Math.cos(a) * width * 0.16,
          py + Math.sin(a * 1.2) * height * 0.12,
          px + Math.cos(a + 1.3) * width * 0.28,
          py + Math.sin(a + 0.4) * height * 0.24,
          px + Math.cos(a + 0.7) * width * 0.42,
          py + Math.sin(a + 0.8) * height * 0.36
        );
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawAlcoholWobble(now, px, py, mode) {
      ctx.save();
      ctx.globalAlpha = 0.24 + intensity * 0.28;
      for (let y = -40; y < height + 60; y += 34) {
        const wave = Math.sin(y * 0.018 + now * 0.002) * (22 + intensity * 38);
        const color = mode.colors[Math.abs(Math.floor(y / 34)) % mode.colors.length];
        ctx.strokeStyle = color;
        ctx.lineWidth = 10 + intensity * 14;
        ctx.shadowColor = color;
        ctx.shadowBlur = 28;
        ctx.beginPath();
        ctx.moveTo(-80, y + wave);
        ctx.bezierCurveTo(width * 0.28, y - wave * 1.4, width * 0.62, y + wave * 1.6, width + 80, y - wave);
        ctx.stroke();
      }
      const amber = ctx.createRadialGradient(px, py, 20, px, py, Math.max(width, height) * 0.7);
      amber.addColorStop(0, "rgba(255,177,77,0.34)");
      amber.addColorStop(0.5, "rgba(124,31,24,0.18)");
      amber.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = amber;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function drawModeField(now, px, py, mode) {
      if (mode.effect === "weedTunnel") {
        drawTunnel(now, px, py, mode, { speed: 0.09, twist: 0.0006, wobble: 1.5 });
      } else if (mode.effect === "focusTunnel") {
        drawTunnel(now, px, py, mode, { speed: 0.12, twist: 0.0012, wobble: 0.35 });
      } else if (mode.effect === "mushrooms") {
        drawOrganicDrift(now, px, py, mode);
      } else if (mode.effect === "lsd") {
        drawTunnel(now, px, py, mode, { sides: 6, speed: 0.2, twist: 0.0024, wobble: 0.9 });
        drawRadialSpokes(now, px, py, mode, 24);
      } else if (mode.effect === "dmt") {
        drawTunnel(now, px, py, mode, { sides: 8, speed: 0.34, twist: 0.0038, wobble: 1.1 });
        drawRadialSpokes(now, px, py, mode, 32);
      } else if (mode.effect === "alcohol") {
        drawAlcoholWobble(now, px, py, mode);
      }
    }

    function draw(now) {
      const dt = Math.min(0.04, (now - lastTime) / 1000);
      lastTime = now;
      const mode = activeMode();
      updateNavigation(dt);
      const view = viewPoint();
      const px = view.x;
      const py = view.y;
      intensity += (pointer.down ? 0.9 : 0.42 - intensity) * dt * 0.9;
      intensity = Math.max(0.25, Math.min(1, intensity));
      capturePulse = Math.max(0, capturePulse - dt * 1.7);
      peakPulse = Math.max(0, peakPulse - dt * 1.2);
      peakCooldown = Math.max(0, peakCooldown - dt);
      charge = Math.max(0.08, charge - dt * 0.025);
      updateAudio(dt);

      const flash = strobe && Math.floor(now / 85) % 2 === 0;
      const fade = 0.2 - camera.rush * 0.07 - peakPulse * 0.06;
      ctx.fillStyle = flash ? "rgba(248, 240, 218, 0.42)" : `rgba(5, 5, 5, ${Math.max(0.08, fade)})`;
      ctx.fillRect(0, 0, width, height);

      const sweep = ctx.createRadialGradient(px, py, 20, px, py, Math.max(width, height) * (0.78 + peakPulse * 0.22));
      sweep.addColorStop(0, `${mode.colors[1]}${peakPulse > 0 ? "aa" : "66"}`);
      sweep.addColorStop(0.26, `${mode.colors[2]}${peakPulse > 0 ? "66" : "22"}`);
      sweep.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = sweep;
      ctx.fillRect(0, 0, width, height);
      ctx.save();
      ctx.translate(px, py);
      ctx.scale(view.scale, view.scale);
      ctx.translate(-px, -py);
      drawModeField(now, px, py, mode);
      ctx.restore();

      stars.forEach((star) => {
        const alpha = 0.25 + peakPulse * 0.45 + Math.sin(now * 0.004 + star.phase) * 0.2;
        ctx.fillStyle = `rgba(248,240,218,${alpha})`;
        const size = star.size * (1 + peakPulse * 5);
        ctx.fillRect(star.x, star.y, size, size);
      });

      particles.forEach((particle) => {
        const dx = px - particle.x;
        const dy = py - particle.y;
        const dist = Math.hypot(dx, dy) || 1;
        const zoneyPull = mode.effect === "weedTunnel" ? 210 : 110;
        const holdRelease = mode.effect === "alcohol" ? -150 : -220;
        const pull = pointer.active ? (pointer.down ? holdRelease : zoneyPull) / (dist + 80) : 0;
        particle.vx += (dx / dist) * pull * dt;
        particle.vy += (dy / dist) * pull * dt;
        const swirl = mode.effect === "dmt" || mode.effect === "lsd" ? 0.09 : 0.03;
        const drift = mode.effect === "mushrooms" ? 0.055 : swirl;
        particle.vx += Math.sin(now * 0.0015 + particle.spin) * drift + (-dy / dist) * capturePulse * 0.12;
        particle.vy += Math.cos(now * 0.0013 + particle.spin) * drift + (dx / dist) * capturePulse * 0.12;
        particle.vx *= 0.992;
        particle.vy *= 0.992;
        const speedBoost = mode.effect === "dmt" ? 2.6 : mode.effect === "weedTunnel" ? 1.1 : 1.8;
        particle.x += particle.vx * (0.8 + intensity * speedBoost) * (0.82 + camera.zoom * 0.28);
        particle.y += particle.vy * (0.8 + intensity * speedBoost) * (0.82 + camera.zoom * 0.28);
        if (particle.x < -40) particle.x = width + 40;
        if (particle.x > width + 40) particle.x = -40;
        if (particle.y < -40) particle.y = height + 40;
        if (particle.y > height + 40) particle.y = -40;

        const color = mode.colors[particle.hue % mode.colors.length];
        const size = particle.size * (1 + intensity * 1.8 + capturePulse * 1.4 + peakPulse * 1.8) * (0.82 + camera.zoom * 0.22);
        ctx.save();
        ctx.translate(particle.x, particle.y);
        ctx.rotate(particle.spin + now * (mode.effect === "alcohol" ? 0.0008 : 0.002));
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 22 + intensity * 42;
        ctx.fillRect(-size / 2, -size / 2, size, size);
        ctx.restore();
      });

      rings = rings.filter((ring) => ring.life > 0);
      rings.forEach((ring) => {
        ring.r += (260 + ring.force * 160) * dt;
        ring.life -= dt * 0.72;
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,230,109,${ring.life})`;
        ctx.lineWidth = 5 + ring.force * 6;
        ctx.shadowColor = mode.colors[2];
        ctx.shadowBlur = 26;
        ctx.stroke();
        particles.forEach((particle) => {
          const dx = particle.x - ring.x;
          const dy = particle.y - ring.y;
          const dist = Math.hypot(dx, dy) || 1;
          if (Math.abs(dist - ring.r) < 42) {
            particle.vx += (dx / dist) * ring.force * 1.8;
            particle.vy += (dy / dist) * ring.force * 1.8;
          }
        });
      });

      requestAnimationFrame(draw);
    }

    soundButton.addEventListener("click", () => setSound(!soundOn));
    burstButton.addEventListener("click", () => burst(1.25));
    strobeButton.addEventListener("click", () => {
      strobe = !strobe;
      strobeButton.dataset.active = String(strobe);
    });
    async function setImmersive(enabled) {
      immersive = enabled;
      document.body.classList.toggle("immersive", immersive);
      focusButton.textContent = immersive ? "Show controls" : "Fullscreen";
      focusButton.dataset.active = String(immersive);
      if (immersive && document.fullscreenEnabled && !document.fullscreenElement) {
        try {
          await document.documentElement.requestFullscreen();
        } catch (err) {
          // Some mobile browsers reject fullscreen outside installed web apps.
        }
      } else if (!immersive && document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (err) {
          // Fullscreen state is best-effort.
        }
      }
    }
    focusButton.addEventListener("click", () => setImmersive(!immersive));
    resetButton.addEventListener("click", () => {
      rings = [];
      intensity = 0.45;
      charge = 0.18;
      peakPulse = 0;
      camera.zoom = 1;
      camera.x = 0;
      camera.y = 0;
      seed();
    });
    modeSelect.addEventListener("change", () => {
      const mode = activeMode();
      modeTitle.textContent = mode.title;
      modeLine.textContent = mode.line;
      burst(0.75);
    });

    canvas.addEventListener("pointermove", (event) => {
      event.preventDefault();
      setPointer(event);
    });
    canvas.addEventListener("pointerdown", handlePointerDown);
    canvas.addEventListener("wheel", handleWheel, { passive: false });
    canvas.addEventListener("touchstart", handleTouchStart, { passive: false });
    canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
    canvas.addEventListener("touchend", handleTouchEnd);
    canvas.addEventListener("touchcancel", handleTouchEnd);
    canvas.addEventListener("contextmenu", (event) => event.preventDefault());
    canvas.addEventListener("pointerup", (event) => {
      event.preventDefault();
      if (canvas.releasePointerCapture && event.pointerId !== undefined) {
        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch (err) {
          // Pointer capture is a progressive enhancement.
        }
      }
      pointer.down = false;
    });
    canvas.addEventListener("pointercancel", () => {
      pointer.down = false;
    });
    window.addEventListener("pointerup", () => {
      pointer.down = false;
    });
    window.addEventListener("touchmove", (event) => {
      event.preventDefault();
    }, { passive: false });
    window.addEventListener("selectstart", (event) => event.preventDefault());
    window.addEventListener("contextmenu", (event) => event.preventDefault());
    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["w", "a", "s", "d"].includes(key)) {
        event.preventDefault();
        if (!keys.has(key)) {
          if (key === "w") camera.y -= 92;
          if (key === "s") camera.y += 92;
          if (key === "a") camera.x -= 92;
          if (key === "d") camera.x += 92;
          camera.rush = Math.min(1.2, camera.rush + 0.2);
          chargeInteraction(0.08);
        }
        keys.add(key);
        soundStatus.textContent = "WASD drift";
      }
      if (event.code === "Space") {
        event.preventDefault();
        burst(1.35);
      }
      if (key === "m") {
        setSound(!soundOn);
      }
      if (key === "f") {
        setImmersive(!immersive);
      }
      if (event.key === "Escape" && immersive) {
        setImmersive(false);
      }
    });
    window.addEventListener("keyup", (event) => {
      keys.delete(event.key.toLowerCase());
    });
    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && immersive) {
        immersive = false;
        document.body.classList.remove("immersive");
        focusButton.textContent = "Fullscreen";
        focusButton.dataset.active = "false";
      }
    });
    window.addEventListener("resize", resize);

    resize();
    burst(0.6);
    requestAnimationFrame(draw);
  </script>
  <script defer src="/issue-launcher.js"></script>
</body>
</html>
